<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #07172e, #020409 70%);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .login-container {
            width: 90%;
            max-width: 520px;
            margin: 80px auto;
            padding: 35px;
            border: 1px solid #1e3a5f;
            border-radius: 20px;
            background: rgba(2, 8, 20, 0.95);
            box-shadow: 0 0 35px rgba(0, 102, 255, 0.25);
        }

        .brand-title {
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #1e90ff, #8a5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            letter-spacing: 4px;
            color: #d8d8d8;
            margin-bottom: 30px;
        }

        .login-card {
            padding: 28px;
            border-radius: 18px;
            background: rgba(10, 18, 35, 0.9);
            border: 1px solid #243b5c;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.12);
        }

        label {
            color: #d8d8d8;
            margin-bottom: 8px;
        }

        .form-control {
            background: #050b16;
            border: 1px solid #263f63;
            color: white;
            padding: 14px;
        }

        .form-control:focus {
            background: #050b16;
            color: white;
            border-color: #1e90ff;
            box-shadow: 0 0 10px rgba(30, 144, 255, 0.4);
        }

        .form-control::placeholder {
            color: #8b98a8;
        }

        .login-btn {
            background: linear-gradient(90deg, #144dff, #0d6efd);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px;
            border-radius: 12px;
            border: none;
            width: 100%;
        }

        .login-btn:hover {
            background: linear-gradient(90deg, #0d6efd, #7a5cff);
            color: white;
        }

        .alert-custom {
            background: rgba(255, 59, 107, 0.15);
            border: 1px solid #ff3b6b;
            color: #ff9ab1;
            border-radius: 12px;
        }

        .footer-text {
            text-align: center;
            color: #aab7c5;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="login-container">

    <h1 class="brand-title">
        Technical technologies
    </h1>

    <p class="subtitle">
        RECRUITER LOGIN
    </p>

    <div class="login-card">

        <h4 class="text-center mb-4">
            🔐 Admin Access
        </h4>

        {% if error %}

        <div class="alert alert-custom">
            {{ error }}
        </div>

        {% endif %}

        <form method="POST">

            <div class="mb-3">

                <label>Username</label>

                <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter username"
                required>

            </div>

            <div class="mb-4">

                <label>Password</label>

                <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required>

            </div>

            <button type="submit" class="login-btn">
                Login to Dashboard
            </button>

        </form>

    </div>

    <p class="footer-text">
        Secure recruiter access only
    </p>

</div>

</body>
</html>
